<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizPro Live | Supabase Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .hidden { display: none; }
        .active-link { background: #4f46e5; color: white; border-radius: 12px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden font-sans">

    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col p-6 z-20">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg"><i class="fas fa-layer-group"></i></div>
            <h1 class="text-xl font-black text-slate-800">QuizPro</h1>
        </div>
        <nav class="space-y-2 flex-1">
            <button onclick="showSection('home')" id="link-home" class="nav-item w-full flex items-center gap-3 px-4 py-3 text-slate-500 rounded-xl transition active-link"><i class="fas fa-home"></i> <span>Home</span></button>
            <button onclick="showSection('listing')" id="link-listing" class="nav-item w-full flex items-center gap-3 px-4 py-3 text-slate-500 rounded-xl transition"><i class="fas fa-globe"></i> <span>Explore</span></button>
            <button onclick="checkAuth('create')" id="link-create" class="nav-item w-full flex items-center gap-3 px-4 py-3 text-slate-500 rounded-xl transition"><i class="fas fa-plus-circle"></i> <span>Create</span></button>
        </nav>
        <div id="authPanel" class="border-t pt-6"></div>
    </aside>

    <main class="flex-1 overflow-y-auto bg-slate-50 p-8">
        <div class="max-w-5xl mx-auto">
            
            <section id="home" class="animate-fade">
                <div class="bg-indigo-600 rounded-[2rem] p-12 text-white shadow-2xl relative overflow-hidden">
                    <div class="relative z-10">
                        <h2 class="text-5xl font-black mb-4">Cloud Quiz Maker</h2>
                        <p class="text-indigo-100 text-lg mb-8 max-w-md">Create quizzes in Nashik, take them anywhere in the world. Powered by Supabase.</p>
                        <button onclick="showSection('listing')" class="bg-white text-indigo-600 px-8 py-4 rounded-2xl font-bold hover:scale-105 transition">Browse Quizzes</button>
                    </div>
                    <i class="fas fa-cloud absolute -right-10 -bottom-10 text-9xl text-white/10 rotate-12"></i>
                </div>
            </section>

            <section id="listing" class="hidden animate-fade">
                <h2 class="text-3xl font-black mb-8 text-slate-800">Global Library</h2>
                <div id="quizContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </section>

            <section id="create" class="hidden animate-fade">
                <div class="bg-white rounded-3xl p-8 shadow-xl border border-slate-100">
                    <h2 class="text-2xl font-bold mb-6">Builder</h2>
                    <input id="quizTitle" type="text" placeholder="Quiz Title..." class="w-full p-4 bg-slate-50 border rounded-2xl mb-6 outline-none focus:ring-2 focus:ring-indigo-500">
                    <div id="questionsContainer" class="space-y-4"></div>
                    <div class="mt-8 pt-6 border-t flex gap-4">
                        <button onclick="addQuestionUI()" class="flex-1 py-4 border-2 border-dashed rounded-2xl font-bold text-slate-400">Add Question</button>
                        <button onclick="saveToSupabase()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg hover:bg-indigo-700 transition">Publish Quiz</button>
                    </div>
                </div>
            </section>

            <section id="taking" class="hidden animate-fade max-w-2xl mx-auto">
                <div class="mb-6">
                    <div class="flex justify-between text-xs font-bold text-slate-400 mb-2">
                        <span id="qIdxText">Question 1</span>
                        <span id="progressText">0%</span>
                    </div>
                    <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                        <div id="progressBar" class="bg-indigo-600 h-full transition-all" style="width: 0%"></div>
                    </div>
                </div>
                <div id="quizContent" class="bg-white p-10 rounded-[2rem] shadow-2xl border"></div>
            </section>

            <section id="results" class="hidden animate-fade text-center">
                <h2 class="text-4xl font-black mb-4">Results</h2>
                <div id="scoreDisplay" class="text-7xl font-black text-indigo-600 mb-8">0/0</div>
                <div id="feedbackBox" class="max-w-md mx-auto text-left space-y-3 mb-8"></div>
                <button onclick="showSection('listing')" class="bg-slate-900 text-white px-8 py-3 rounded-xl font-bold">Back to Library</button>
            </section>

            <section id="login" class="hidden animate-fade py-20 text-center">
                <div class="max-w-sm mx-auto bg-white p-10 rounded-3xl shadow-2xl">
                    <h2 class="text-2xl font-bold mb-6">Enter Your Name</h2>
                    <input id="userInput" type="text" placeholder="Username" class="w-full p-4 bg-slate-50 border rounded-2xl mb-4 outline-none">
                    <button onclick="login()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold">Start Creating</button>
                </div>
            </section>

        </div>
    </main>

    <script>
        // --- 1. CONFIGURATION ---
        const SUPABASE_URL = 'https://omvvhklntequyacptnbx.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JmOBW1wVdN8wXrTlTmucFA_U1iDEQ9Z';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = localStorage.getItem('qz_user');
        let currentQuiz = null, currentQuestionIndex = 0, userAnswers = [];

        // --- 2. CORE DATABASE LOGIC ---
        async function saveToSupabase() {
            const title = document.getElementById('quizTitle').value;
            const qBlocks = document.querySelectorAll('.q-block');
            const questions = Array.from(qBlocks).map(node => ({
                text: node.querySelector('.q-text').value,
                options: Array.from(node.querySelectorAll('.opt')).map(i => i.value),
                correct: parseInt(node.querySelector('.correct-idx').value)
            }));

            if(!title || questions.length === 0) return alert("Fill all fields!");

            const { error } = await _supabase.from('quizzes').insert([{
                title, creator: currentUser, questions, likes: 0
            }]);

            if (error) {
                console.error(error);
                alert("Database Error: " + error.message);
            } else {
                showSection('listing');
            }
        }

        async function fetchQuizzes() {
            const container = document.getElementById('quizContainer');
            container.innerHTML = "Loading Quizzes...";
            const { data, error } = await _supabase.from('quizzes').select('*').order('created_at', { ascending: false });
            
            if (error) return container.innerHTML = "Error fetching data.";
            
            container.innerHTML = data.map(q => `
                <div class="bg-white p-6 rounded-3xl border shadow-sm hover:shadow-xl transition group">
                    <h3 class="text-xl font-bold text-slate-800">${q.title}</h3>
                    <p class="text-xs text-slate-400 font-bold mb-6 uppercase tracking-widest">By ${q.creator}</p>
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full text-xs font-bold">${q.questions.length} Qs</span>
                        <span class="text-slate-400 text-sm"><i class="fas fa-heart text-pink-500"></i> ${q.likes}</span>
                    </div>
                    <button onclick='initQuiz(${JSON.stringify(q)})' class="w-full py-3 bg-slate-100 rounded-2xl font-bold group-hover:bg-indigo-600 group-hover:text-white transition">Take Quiz</button>
                </div>
            `).join('');
        }

        // --- 3. UI LOGIC ---
        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-link'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('link-' + id)?.classList.add('active-link');
            if(id === 'listing') fetchQuizzes();
            updateAuthUI();
        }

        function updateAuthUI() {
            const panel = document.getElementById('authPanel');
            panel.innerHTML = currentUser ? 
                `<button onclick="logout()" class="text-red-500 w-full text-left font-bold px-2"><i class="fas fa-power-off"></i> Logout (${currentUser})</button>` :
                `<button onclick="showSection('login')" class="text-indigo-600 w-full text-left font-bold px-2">Login</button>`;
        }

        function login() {
            const val = document.getElementById('userInput').value;
            if(val) { localStorage.setItem('qz_user', val); currentUser = val; showSection('home'); }
        }

        function logout() { localStorage.removeItem('qz_user'); currentUser = null; showSection('home'); }

        function checkAuth(target) {
            if(!currentUser) showSection('login');
            else { 
                showSection(target); 
                if(target === 'create') {
                    document.getElementById('questionsContainer').innerHTML = '';
                    document.getElementById('quizTitle').value = '';
                    addQuestionUI();
                }
            }
        }

        function addQuestionUI() {
            const html = `
                <div class="q-block p-5 bg-slate-50 rounded-2xl border space-y-3">
                    <input type="text" placeholder="Question" class="w-full p-2 q-text rounded-lg border">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" placeholder="Option A" class="p-2 border rounded-lg opt">
                        <input type="text" placeholder="Option B" class="p-2 border rounded-lg opt">
                        <input type="text" placeholder="Option C" class="p-2 border rounded-lg opt">
                        <input type="text" placeholder="Option D" class="p-2 border rounded-lg opt">
                    </div>
                    <select class="w-full p-2 border rounded-lg correct-idx font-bold text-indigo-600">
                        <option value="0">Correct: A</option><option value="1">Correct: B</option>
                        <option value="2">Correct: C</option><option value="3">Correct: D</option>
                    </select>
                </div>`;
            document.getElementById('questionsContainer').insertAdjacentHTML('beforeend', html);
        }

        function initQuiz(q) {
            currentQuiz = q; currentQuestionIndex = 0; userAnswers = [];
            showSection('taking');
            renderQuestion();
        }

        function renderQuestion() {
            const q = currentQuiz.questions[currentQuestionIndex];
            const total = currentQuiz.questions.length;
            const pct = ((currentQuestionIndex + 1) / total) * 100;
            
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('progressText').innerText = Math.round(pct) + '%';
            document.getElementById('qIdxText').innerText = `Question ${currentQuestionIndex + 1}/${total}`;

            document.getElementById('quizContent').innerHTML = `
                <h2 class="text-2xl font-bold mb-8 text-slate-800">${q.text}</h2>
                <div class="space-y-3">
                    ${q.options.map((opt, i) => `<button onclick="submitAnswer(${i})" class="w-full p-4 border-2 rounded-2xl text-left font-medium hover:border-indigo-600 hover:bg-indigo-50 transition">${opt}</button>`).join('')}
                </div>
            `;
        }

        function submitAnswer(idx) {
            userAnswers.push(idx);
            if(currentQuestionIndex < currentQuiz.questions.length - 1) {
                currentQuestionIndex++; renderQuestion();
            } else {
                showFinalResults();
            }
        }

        function showFinalResults() {
            showSection('results');
            let score = 0, feedback = '';
            currentQuiz.questions.forEach((q, i) => {
                const isCorrect = q.correct === userAnswers[i];
                if(isCorrect) score++;
                feedback += `<div class="p-3 rounded-xl border ${isCorrect ? 'bg-green-50 border-green-100' : 'bg-red-50 border-red-100'} text-sm font-bold">${i+1}. Correct: ${q.options[q.correct]}</div>`;
            });
            document.getElementById('scoreDisplay').innerText = `${score} / ${currentQuiz.questions.length}`;
            document.getElementById('feedbackBox').innerHTML = feedback;
        }

        showSection('home');
    </script>
</body>
</html>
